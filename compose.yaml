# Local-dev docker-compose for the bridge + payment daemon stack.
#
# Usage:
#   cp .env.example .env            # fill in the REQUIRED values (CHAIN_RPC, Stripe, admin, pepper)
#   cp /path/to/keystore.json ./keystore.json
#   printf '%s' 'your-password' > ./keystore-password && chmod 600 ./keystore-password
#   docker compose up --build
#
# Prod deployments layer compose.prod.yaml on top:
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# See docs/operations/deployment.md for the full walkthrough.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PGUSER:-bridge}
      POSTGRES_PASSWORD: ${PGPASSWORD:-bridge_dev_password}
      POSTGRES_DB: ${PGDATABASE:-bridge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${PGUSER:-bridge}']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  payment-daemon:
    image: ${PAYMENT_DAEMON_IMAGE:-tztcloud/livepeer-payment-daemon:v3.0.2}
    command:
      - --mode=sender
      - --socket=/var/run/livepeer/payment.sock
      - --chain-rpc=${CHAIN_RPC:?set CHAIN_RPC (Arbitrum One RPC endpoint)}
      - --keystore-path=/etc/livepeer/keystore.json
      - --keystore-password-file=/etc/livepeer/keystore-password
      # Hot/cold split — uncomment to sign with the mounted keystore while
      # embedding a different orchestrator identity in every ticket.
      # - --orch-address=${PAYER_ORCH_ADDRESS}
      # Non-Arbitrum chains — set all four together.
      # - --expected-chain-id=${EXPECTED_CHAIN_ID}
      # - --ticketbroker-address=${TICKETBROKER_ADDRESS}
      # - --rounds-manager-address=${ROUNDS_MANAGER_ADDRESS}
      # - --bonding-manager-address=${BONDING_MANAGER_ADDRESS}
    volumes:
      - ${PAYER_KEYSTORE_PATH:-./keystore.json}:/etc/livepeer/keystore.json:ro
      - ${PAYER_KEYSTORE_PASSWORD_PATH:-./keystore-password}:/etc/livepeer/keystore-password:ro
      - payment-socket:/var/run/livepeer

  service-registry-daemon:
    # Resolver-mode daemon that the bridge calls via gRPC to discover
    # WorkerNodes. Public Docker Hub image; override SERVICE_REGISTRY_IMAGE
    # if you publish your own.
    image: ${SERVICE_REGISTRY_IMAGE:-tztcloud/livepeer-service-registry-daemon:v3.0.2}
    command:
      - --mode=resolver
      - --discovery=overlay-only
      - --socket=/var/run/livepeer/service-registry.sock
      - --static-overlay=/etc/livepeer/service-registry.yaml
      - --service-registry-address=${SERVICE_REGISTRY_CONTRACT_ADDRESS:-0x04C0b249740175999E5BF5c9ac1dA92431EF34C5}
    volumes:
      - ${SERVICE_REGISTRY_CONFIG_PATH:-./service-registry-config.yaml}:/etc/livepeer/service-registry.yaml:ro
      - payment-socket:/var/run/livepeer

  bridge:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-daemon:
        condition: service_started
      service-registry-daemon:
        condition: service_started
    environment:
      HOST: '0.0.0.0'
      PORT: '8080'

      # Database
      PGHOST: postgres
      PGPORT: '5432'
      PGUSER: ${PGUSER:-bridge}
      PGPASSWORD: ${PGPASSWORD:-bridge_dev_password}
      PGDATABASE: ${PGDATABASE:-bridge}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: '6379'

      # Auth (pepper must be ≥ 16 chars)
      API_KEY_PEPPER: ${API_KEY_PEPPER:?set API_KEY_PEPPER (>= 16 chars)}
      API_KEY_ENV_PREFIX: ${API_KEY_ENV_PREFIX:-test}

      # PayerDaemon — socket lives on the shared payment-socket volume
      PAYER_DAEMON_SOCKET: /var/run/livepeer/payment.sock

      # Bridge's own ETH address (must match the payer-daemon keystore).
      # Sent as ?sender= when probing worker /quote + /quotes.
      BRIDGE_ETH_ADDRESS: ${BRIDGE_ETH_ADDRESS:?set BRIDGE_ETH_ADDRESS (0x-prefixed 40-hex; must match payer-daemon keystore)}

      # Stripe (use test-mode keys for local dev)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?set STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?set STRIPE_WEBHOOK_SECRET}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:8080/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:8080/cancel}

      # Admin
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN (>= 32 chars)}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}

      BRIDGE_AUTO_MIGRATE: 'true'
      # service-registry-daemon resolver socket on the shared payment-socket volume.
      SERVICE_REGISTRY_SOCKET: ${SERVICE_REGISTRY_SOCKET:-/var/run/livepeer/service-registry.sock}
    volumes:
      - payment-socket:/var/run/livepeer
    ports:
      - '8080:8080'
    healthcheck:
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://127.0.0.1:8080/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  payment-socket:
