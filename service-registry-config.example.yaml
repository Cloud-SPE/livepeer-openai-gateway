# Example resolver-mode config for the service-registry-daemon sidecar.
# Copy to service-registry-config.yaml at the repo root (gitignored) and
# edit to point at the WorkerNode pool the bridge should route to.
#
# The compose stack mounts this file at /etc/livepeer/service-registry.yaml
# on both the local-dev (compose.yaml) and prod (compose.prod.yaml) layers.
# See docs/operations/deployment.md for the operator walkthrough.

# Resolver-mode daemon: it answers Select / ListKnown / ResolveByAddress
# RPCs from this static overlay. Production deployments can combine the
# same shape with on-chain discovery; overlay-only keeps the pool fully
# operator-curated.
overlay:
  - eth_address: '0x1111111111111111111111111111111111111111'
    enabled: true
    tier_allowed: [free, prepaid]
    weight: 100
    unsigned_allowed: true
    pin:
      - id: worker-chat-1
        url: https://worker1.example.com
        weight: 100
        capabilities:
          - name: openai:/v1/chat/completions
            work_unit: token
            offerings:
              - id: llama-3.3-70b
                price_per_work_unit_wei: '25000000'
              - id: mistral-7b-instruct
                price_per_work_unit_wei: '18000000'
        tier_allowed: [free, prepaid]

  - eth_address: '0x2222222222222222222222222222222222222222'
    enabled: true
    tier_allowed: [prepaid]
    weight: 50
    unsigned_allowed: true
    pin:
      - id: worker-multi-1
        url: https://worker2.example.com
        weight: 50
        capabilities:
          - name: openai:/v1/chat/completions
            work_unit: token
            offerings:
              - id: llama-3.3-70b
                price_per_work_unit_wei: '25000000'
          - name: openai:/v1/embeddings
            work_unit: token
            offerings:
              - id: text-embedding-3-small
                price_per_work_unit_wei: '5000000'
          - name: openai:/v1/images/generations
            work_unit: image
            offerings:
              - id: sdxl-turbo
                price_per_work_unit_wei: '2000000000000000'
          - name: openai:/v1/images/edits
            work_unit: image
            offerings:
              - id: sdxl-edit
                price_per_work_unit_wei: '2500000000000000'
          - name: openai:/v1/audio/speech
            work_unit: character
            offerings:
              - id: tts-1
                price_per_work_unit_wei: '5000000'
          - name: openai:/v1/audio/transcriptions
            work_unit: second
            offerings:
              - id: whisper-large-v3
                price_per_work_unit_wei: '100000000000000'
        tier_allowed: [prepaid]
