name: lint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - run: npm run typecheck

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - run: npm run fmt:check

  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - run: npm run doc-lint

  # proto-drift removed in v3.0.0: this repo no longer ships its own
  # proto stubs. The resolver client lives in
  # @cloudspe/livepeer-openai-gateway-core (npm), which has its own
  # proto-drift CI in that repo. Bridge consumers pin via package-lock
  # against a published version.

  # secret-scan (gitleaks) removed in v3.0.0: gitleaks-action requires a
  # paid commercial license for org accounts (`GITLEAKS_LICENSE`).
  # GitHub's native push-protection already covers the same scan-on-push
  # use case at the platform level — gitleaks-action's only added value
  # was branch-content scanning beyond what push-protection covers,
  # which we accept losing.
